name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: wedding-rsvp-project/package-lock.json
      - run: npm ci
        working-directory: wedding-rsvp-project
      - run: npm run build
        working-directory: wedding-rsvp-project
